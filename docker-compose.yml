services:
  postgres:
    image: postgres:16
    container_name: bizmanager-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bizmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: bizmanager-backend
    restart: always
    ports:
      - "3333:3333"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: "postgresql://admin:admin@postgres:5432/bizmanager?schema=public"
      JWT_SECRET: "supersecretkey"
    command: sh -c "npx prisma generate && npm run dev"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data: